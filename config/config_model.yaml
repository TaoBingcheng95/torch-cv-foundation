training:
  epochs: 100
  batch_size: 4
  learning_rate: 0.001
  optimizer: "adam"  # 选择优化器：adam 或 sgd
  loss_function: "cross_entropy"  # 损失函数：cross_entropy 或 mse
  scheduler:
    type: "step_lr"  # 学习率调度器类型: step_lr
    step_size: 10    # 每隔多少个 epoch 调整一次学习率
    gamma: 0.1       # 学习率调整的倍率
  resume: null  # 恢复训练时使用的模型路径，如'./outputs/20240831_202015/best_model_acc_0.8348_miou_0.7164.pth'
  device: "cuda"  # 设备：cuda 或 cpu

dataset:
  train: "./data/WHDLD/outputs/train"
  val: "./data/WHDLD/outputs/val"
  in_channels: 3
  num_classes: 6
  num_workers: 4
  input_size: [224, 224]  # 输入图像的尺寸（高度, 宽度）

model:
  name: "unet"  # 模型名称：unet 或其他
  init_weights: true  # 是否初始化模型权重

save:
  output_dir: "outputs"